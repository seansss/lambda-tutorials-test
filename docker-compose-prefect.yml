services:
  lambda_prefect_postgres:
    image: postgres:14
    environment:
      POSTGRES_USER: prefect
      POSTGRES_PASSWORD: prefect
      POSTGRES_DB: prefect_lambda
    volumes:
      - lambda_prefect_pg_data:/var/lib/postgresql/data
    ports:
      - "5454:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prefect"]
      interval: 5s
      timeout: 5s
      retries: 5

  lambda_prefect_redis:
    image: redis:7
    volumes:
      - lambda_prefect_redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  lambda_prefect_server:
    image: prefecthq/prefect:3-latest
    depends_on:
      lambda_prefect_postgres:
        condition: service_healthy
      lambda_prefect_redis:
        condition: service_healthy
    environment:
      PREFECT_API_DATABASE_CONNECTION_URL: postgresql+asyncpg://prefect:prefect@lambda_prefect_postgres:5432/prefect
      PREFECT_SERVER_API_HOST: 0.0.0.0
      PREFECT_MESSAGING_BROKER: prefect_redis.messaging
      PREFECT_MESSAGING_CACHE: prefect_redis.messaging
      PREFECT_REDIS_MESSAGING_HOST: lambda_prefect_redis
      PREFECT_REDIS_MESSAGING_PORT: 6379
      PREFECT_REDIS_MESSAGING_DB: 0
      PREFECT_UI_API_URL: /api
      ENVIRONMENT: localMachineServer
      #PREFECT_SERVER_API_AUTH_STRING: username:password
    command: prefect server start --no-services
    # Internal only - accessed via nginx proxy
    ports:
      - "4200:4200"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request as u; u.urlopen('http://host.docker.internal:4200/api/health', timeout=1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  prefect-services:
    image: prefecthq/prefect:3-latest
    depends_on:
      lambda_prefect_server:
        condition: service_healthy
    environment:
      PREFECT_API_DATABASE_CONNECTION_URL: postgresql+asyncpg://prefect:prefect@lambda_prefect_postgres:5432/prefect
      PREFECT_MESSAGING_BROKER: prefect_redis.messaging
      PREFECT_MESSAGING_CACHE: prefect_redis.messaging
      PREFECT_REDIS_MESSAGING_HOST: lambda_prefect_redis
      PREFECT_REDIS_MESSAGING_PORT: 6379
      PREFECT_REDIS_MESSAGING_DB: 0
    command: prefect server services start

  # Docker worker that launches each flow run as a Docker container
  prefect-docker-worker:
    image: prefecthq/prefect:3-latest
    depends_on:
      lambda_prefect_server:
        condition: service_healthy
    environment:
      PREFECT_API_URL: http://host.docker.internal:4200/api
      ENVIRONMENT: localMachineDockerWorker
      #PREFECT_API_AUTH_STRING: username:password
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: >
      bash -lc "pip install -q prefect-docker &&
      prefect worker start --pool docker-pool-lambda --type docker"
    restart: on-failure

  # Builds your flow image (via Dockerfile) AND registers the deployment in Prefect
  deployer:
    build:
      context: .
      dockerfile: Dockerfile.prefect
    image: getting-started-flow:lambda
    container_name: lambda_prefect_deployer
    env_file:
      - .env.prefect
    depends_on:
      lambda_prefect_server:
        condition: service_healthy
    environment:
      PREFECT_API_URL: http://host.docker.internal:4200/api
      #PREFECT_API_AUTH_STRING: username:password
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: >
      bash -lc "
      prefect work-pool create docker-pool-lambda --type docker || true
      && python prefect_deploy.py
      "
    restart: "no"

volumes:
  lambda_prefect_pg_data:
  lambda_prefect_redis_data:
